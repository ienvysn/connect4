<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect 4 - Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="lobby.css" />
  </head>
  <body>
    <div class="lobby-container">
      <h1>Connect 4</h1>

      <div class="username-container">
        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your name"
          maxlength="12"
        />
      </div>

      <div class="tabs">
        <button class="tab-link active" data-tab="create">Create Match</button>
        <button class="tab-link" data-tab="join">Join Match</button>
        <button class="tab-link" data-tab="ai">Play vs AI</button>
      </div>

      <div id="create" class="tab-content active">
        <h3>Create a New Match</h3>
        <p>Click the button to create a new match.</p>
        <button id="create-btn" class="btn">Create Match</button>
      </div>

      <div id="join" class="tab-content">
        <h3>Join an Existing Match</h3>
        <div class="form-group">
          <label for="matchId">Match ID:</label>
          <input
            type="text"
            id="matchId"
            name="matchId"
            placeholder="Enter Match ID"
          />
        </div>
        <button id="join-btn" class="btn">Join Match</button>
      </div>

      <div id="ai" class="tab-content">
        <h3>Play vs AI</h3>
        <p>Challenge our AI opponent, "Bot Lav".</p>
        <div class="form-group">
          <label for="difficulty">Difficulty:</label>
          <select id="difficulty" name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <button id="play-ai-btn" class="btn">Start Game</button>
      </div>

      <p id="error-message" class="error"></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="lobby.js"></script>
  </body>
</html>
